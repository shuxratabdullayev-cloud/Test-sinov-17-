            padding: 1.5rem;
            margin-bottom: 1.5rem;

            color: var(--secondary-color);
            margin-bottom: 0.5rem;
            display: block;
            font-size: 0.9rem;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 1rem;

        .options-list {

        }

            display: block;
            padding: 0.75rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.375rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-item:hover {
            background-color: #f9fafb;
            border-color: #d1d5db;
        }

        .option-item input[type="radio"] {
            margin-right: 0.75rem;
            transform: scale(1.2);
            cursor: pointer;
        }

        .btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn:hover {
            background-color: var(--primary-color);
        }

        /* Results Screen */
        #results-screen {
            display: none;
        }

        .score-board {
            text-align: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 0.5rem;
            margin-bottom: 2rem;
        }

        .score-board h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .score-stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            font-size: 1.2rem;
        }

        .result-item {
            border-left: 4px solid;
            padding-left: 1rem;
            margin-bottom: 1rem;
        }

        .status-correct {
            border-color: var(--success-color);
            background-color: #f0fdf4;
        }

        .status-wrong {
            border-color: var(--danger-color);
            background-color: #fef2f2;
        }

        .result-answer {
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }

        .text-correct {
            color: var(--success-color);
            font-weight: 600;
        }

        .text-wrong {
            color: var(--danger-color);
            font-weight: 600;
        }
        
        .table-data {
            font-size: 0.9rem;
            background: #f9fafb;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;

        // Savol variantlarini random (tasodifiy) qilish funksiyasi
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Testlarni ekranga yuklash
        const questionsContainer = document.getElementById('questions-container');

        questionsData.forEach((item, index) => {
            // Javob variantlarini tasodifiy tartibda aralashtirish
            let shuffledOptions = [...item.options];
            shuffleArray(shuffledOptions);

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="question-number">${index + 1}-savol</span>
                <p class="question-text">${item.q.replace(/\n/g, '<br>')}</p>
                <ul class="options-list">
                    ${shuffledOptions.map((opt, i) => `
                        <label class="option-item">
                            <input type="radio" name="q${index}" value="${opt.replace(/"/g, '&quot;')}">
                            ${opt}
                        </label>
                    `).join('')}
                </ul>
            `;
            questionsContainer.appendChild(card);
        });

        // Testni tekshirish funksiyasi
        function submitQuiz() {
            let score = 0;
            let reviewHTML = '';
            let allAnswered = true;

            for (let i = 0; i < questionsData.length; i++) {
                const selectedOption = document.querySelector(`input[name="q${i}"]:checked`);
                
                if (!selectedOption) {
                    allAnswered = false;
                    break;
                }
            }

            if (!allAnswered) {
                alert("Iltimos, barcha savollarga javob belgilang!");
                return;
            }

            for (let i = 0; i < questionsData.length; i++) {
                const selectedOption = document.querySelector(`input[name="q${i}"]:checked`);
                const userAnswer = selectedOption ? selectedOption.value : null;
                const isCorrect = userAnswer === questionsData[i].correct;
                
                if (isCorrect) score++;

                reviewHTML += `
                    <div class="card result-item ${isCorrect ? 'status-correct' : 'status-wrong'}">
                        <div class="question-number">${i + 1}-savol</div>
                        <p class="question-text">${questionsData[i].q.replace(/\n/g, '<br>')}</p>
                        <div class="table-data">
                            <strong>Sizning javobingiz:</strong> 
                            <span class="${isCorrect ? 'text-correct' : 'text-wrong'}">
                                ${userAnswer || 'Javob berilmagan'}
                            </span>
                        </div>
                        ${!isCorrect ? `
                        <div class="table-data text-correct" style="background:#f0fdf4;">
                            <strong>To'g'ri javob:</strong> ${questionsData[i].correct}
                        </div>` : ''}
                    </div>
                `;
            }

            // Natijani ko'rsatish
            const percentage = ((score / questionsData.length) * 100).toFixed(1);
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';
            
            document.getElementById('correct-count').textContent = score;
            document.getElementById('percentage').textContent = percentage;
            document.getElementById('review-container').innerHTML = reviewHTML;
            
            window.scrollTo(0, 0);
        }
